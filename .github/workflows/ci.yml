name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - 'CITATION.cff'
      - 'llms.txt'
      - '.github/ISSUE_TEMPLATE/**'
      - 'docs/**'
      - 'screenshots/**'
      - 'server/**'
      - 'src/PlanViewer.Ssms/**'
      - 'src/PlanViewer.Ssms.Installer/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore solution
        run: dotnet restore PlanViewer.sln

      - name: Build solution
        run: dotnet build PlanViewer.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/PlanViewer.Core.Tests/PlanViewer.Core.Tests.csproj -c Release --no-build --verbosity normal
